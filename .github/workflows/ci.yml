name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint + Type-check ──────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Biome lint
        run: bunx biome check --reporter=github .

      - name: TypeScript check (server)
        run: bunx tsc --noEmit

      - name: TypeScript check (web UI)
        working-directory: src/web
        run: |
          bun install --frozen-lockfile
          bunx tsc --noEmit

  # ── 2. Test + Coverage ────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── 3. Build Web UI ───────────────────────────────────────────────────────
  build-ui:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root deps
        run: bun install --frozen-lockfile

      - name: Install web UI deps
        working-directory: src/web
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: src/web
        run: bun run build

      - name: Check bundle size
        working-directory: src/web
        run: |
          JS_SIZE=$(du -sk dist/assets/*.js | awk '{sum+=$1} END {print sum}')
          echo "JS bundle: ${JS_SIZE}KB"
          # Fail if JS > 500KB (current ~202KB, plenty of headroom)
          if [ "$JS_SIZE" -gt 500 ]; then
            echo "❌ JS bundle too large: ${JS_SIZE}KB (limit 500KB)"
            exit 1
          fi
          echo "✅ Bundle size OK"

      - name: Upload UI dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-ui-dist
          path: src/web/dist/
          retention-days: 7

  # ── 4. Docker Build ───────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (PR — no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: false
          tags: ark-node-core:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push to GHCR (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ark-node-core:latest
            ghcr.io/${{ github.repository_owner }}/ark-node-core:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/ark-node-core:latest
          CID=$(docker run -d -p 3000:3000 ghcr.io/${{ github.repository_owner }}/ark-node-core:latest)
          sleep 5
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
          UI_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/ui/ || echo "000")
          docker stop $CID
          echo "API /health: $STATUS"
          echo "UI /ui/: $UI_STATUS"
          [ "$STATUS" = "200" ] && [ "$UI_STATUS" = "200" ] && echo "✅ Smoke test passed" || (echo "❌ Smoke test failed"; exit 1)

  # ── 5. Dev Container Build ────────────────────────────────────────────────
  devcontainer:
    name: Dev Container Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository_owner }}/ark-node-core-devcontainer
          cacheFrom: ghcr.io/${{ github.repository_owner }}/ark-node-core-devcontainer
          push: never
          runCmd: |
            echo "Testing devcontainer environment..."
            bun --version
            node --version || true
            echo "✅ Devcontainer build OK"

  # ── 6. Security Scan ─────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/ark-node-core:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Summary gate ─────────────────────────────────────────────────────────
  ci-pass:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, test, build-ui, docker, devcontainer]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then echo "❌ lint failed"; exit 1; fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then echo "❌ test failed"; exit 1; fi
          if [[ "${{ needs.build-ui.result }}" != "success" ]]; then echo "❌ build-ui failed"; exit 1; fi
          if [[ "${{ needs.docker.result }}" != "success" ]]; then echo "❌ docker failed"; exit 1; fi
          if [[ "${{ needs.devcontainer.result }}" != "success" ]]; then echo "❌ devcontainer failed"; exit 1; fi
          echo "✅ All CI checks passed"
