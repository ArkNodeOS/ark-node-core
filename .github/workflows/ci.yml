name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint + Type-check ──────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server deps
        run: bun install --frozen-lockfile

      - name: Biome lint
        run: bunx biome check --reporter=github .

      - name: TypeScript check (server)
        run: bunx tsc --noEmit

      - name: Install web UI deps
        working-directory: src/web
        run: bun install --frozen-lockfile

      - name: TypeScript check (web UI)
        working-directory: src/web
        run: bunx tsc --noEmit

  # ── 2. Test + Coverage ────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── 3. Build Web UI ───────────────────────────────────────────────────────
  build-ui:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root deps
        run: bun install --frozen-lockfile

      - name: Install web UI deps
        working-directory: src/web
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: src/web
        run: bun run build

      - name: Check bundle size (JS < 600 KB raw)
        working-directory: src/web
        run: |
          JS_SIZE=$(du -sk dist/assets/*.js | awk '{sum+=$1} END {print sum}')
          echo "JS bundle: ${JS_SIZE} KB"
          if [ "$JS_SIZE" -gt 600 ]; then
            echo "❌ JS bundle too large: ${JS_SIZE} KB (limit 600 KB)"
            exit 1
          fi
          echo "✅ Bundle size OK"

      - name: Upload UI dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-ui-dist
          path: src/web/dist/
          retention-days: 7

  # ── 4. Docker Build ───────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # GHCR requires lowercase owner
      - name: Set lowercase owner
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build only (pull request — no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: false
          tags: ark-node-core:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push to GHCR (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/ark-node-core:latest
            ghcr.io/${{ env.OWNER }}/ark-node-core:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — wait for server + check /health and /ui/
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          CID=$(docker run -d -p 3000:3000 ghcr.io/${{ env.OWNER }}/ark-node-core:latest)
          echo "Container ID: $CID"

          # Poll up to 30 s for server readiness
          STATUS="000"
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null) || true
            echo "  [${i}/30] /health → $CODE"
            if [ "$CODE" = "200" ]; then STATUS="200"; break; fi
            sleep 1
          done

          UI_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ui/ 2>/dev/null) || true
          docker stop "$CID"
          echo "Result: API /health=$STATUS | UI /ui/=$UI_STATUS"
          [ "$STATUS" = "200" ] && [ "$UI_STATUS" = "200" ] \
            && echo "✅ Smoke test passed" \
            || (echo "❌ Smoke test failed"; exit 1)

  # ── 5. Dev Container Build ────────────────────────────────────────────────
  devcontainer:
    name: Dev Container Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ env.OWNER }}/ark-node-core-devcontainer
          cacheFrom: ghcr.io/${{ env.OWNER }}/ark-node-core-devcontainer
          push: never
          runCmd: |
            bun --version
            echo "✅ Devcontainer OK"

  # ── 6. Container Security Scan ────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/ark-node-core:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Summary gate ──────────────────────────────────────────────────────────
  ci-pass:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, test, build-ui, docker, devcontainer]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          FAILED=""
          [ "${{ needs.lint.result }}"        != "success" ] && FAILED="$FAILED lint"
          [ "${{ needs.test.result }}"        != "success" ] && FAILED="$FAILED test"
          [ "${{ needs.build-ui.result }}"    != "success" ] && FAILED="$FAILED build-ui"
          [ "${{ needs.docker.result }}"      != "success" ] && FAILED="$FAILED docker"
          [ "${{ needs.devcontainer.result }}" != "success" ] && FAILED="$FAILED devcontainer"
          if [ -n "$FAILED" ]; then
            echo "❌ Failed jobs:$FAILED"
            exit 1
          fi
          echo "✅ All CI checks passed"
