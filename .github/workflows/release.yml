name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps & run tests
        run: |
          bun install --frozen-lockfile
          bun test

      - name: Build web UI
        working-directory: src/web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Set up QEMU (for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner + version
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/ark-node-core:latest
            ghcr.io/${{ env.OWNER }}/ark-node-core:${{ steps.version.outputs.VERSION }}
          labels: |
            org.opencontainers.image.title=Ark Node Core
            org.opencontainers.image.description=Personal sovereign server platform
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          else
            LOG=$(git log --pretty=format:"- %s (%h)")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Ark Node v${{ steps.version.outputs.VERSION }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Docker

            ```bash
            docker pull ghcr.io/${{ env.OWNER }}/ark-node-core:${{ steps.version.outputs.VERSION }}
            # or
            docker pull ghcr.io/${{ env.OWNER }}/ark-node-core:latest
            ```

            ## Quick Start

            ```bash
            git clone https://github.com/ArkNodeOS/ark-node-core.git
            cd ark-node-core
            docker-compose up
            # → http://localhost:3000/ui/
            ```
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: false
